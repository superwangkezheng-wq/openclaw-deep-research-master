name: Setup / Runtime Problem
description: Installation, OpenClaw runtime, model routing, RAGFlow, MinerU, search, visual toolchain, cron, or reporting failures.
title: "[Setup]: "
labels:
  - setup
  - runtime
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying OpenClaw Deep Research Master.

        Privacy reminder / 隐私提醒: do not paste API keys, private paths, customer data, internal documents, or screenshots containing secrets.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part failed?
      options:
        - OpenClaw workspace install
        - Model routing or fallback chain
        - AnySearch / Tavily / web search
        - RAGFlow dataset or vector retrieval
        - MinerU PDF parsing
        - Visual toolchain
        - Progress heartbeat / stage report / fallback alert
        - Acceptance gate / release check
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, OpenClaw version if known, model provider/model names, and which optional services are enabled. Redact secrets.
      placeholder: |
        macOS / Linux:
        OpenClaw:
        primary model:
        search backend:
        RAGFlow:
        MinerU:
        visual tools:
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands or workflow steps that trigger the problem.
      placeholder: |
        1. Copy repository to ...
        2. Configure ...
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and logs
      description: Paste the smallest useful log excerpt. Redact tokens, local private paths, dataset IDs, and internal names if needed.
      render: shell
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I removed API keys, private folder mappings, internal documents, and customer data.
          required: true
        - label: I tried `zsh scripts/v1-release-check.sh` or explained why it cannot run.
          required: false
        - label: I tried `zsh scripts/local-runtime-smoke.sh` on an operator machine or explained why it cannot run.
          required: false
